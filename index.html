<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPL Basketball Scoring Interface</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: radial-gradient(circle at top, #2b2500 0, #070707 42%, #000 100%); color: #f5f5f5; min-height: 100vh; }
    .container { max-width: 1120px; margin: 0 auto; padding: 0.6rem 0.75rem 2.5rem; }
    .card { background: linear-gradient(180deg, #141414, #090909); border: 1px solid #2b2b2b; border-radius: 14px; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 10px 30px #0008; }
    .card-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.4px; color: #ffe600; font-weight: 900; margin-bottom: 0.75rem; }

    /* Quarter controls now sit above the score and are intentionally small */
    .quarter-top { display: flex; align-items: center; justify-content: center; gap: 0.28rem; margin-bottom: 0.65rem; flex-wrap: wrap; }
    .quarter-btn { background: #111; border: 1px solid #3a3a3a; color: #d4d4d4; border-radius: 999px; padding: 0.22rem 0.48rem; font-size: 0.64rem; font-weight: 900; cursor: pointer; line-height: 1; min-height: 24px; min-width: 38px; }
    .quarter-btn.active { background: #ffe600; border-color: #ffe600; color: #050505; box-shadow: 0 0 0 2px #ffe60033; }

    .scoreboard { display: grid; grid-template-columns: 1fr 150px 1fr; gap: 0.65rem; align-items: stretch; margin-bottom: 0.7rem; }
    .team-score { background: #050505; border-radius: 12px; padding: 0.8rem; text-align: center; border: 1px solid #3a3a3a; }
    .team-name { font-size: 0.8rem; color: #ffe600; font-weight: 950; margin-bottom: 0.25rem; letter-spacing: .4px; }
    .team-fouls { margin-top: 0.35rem; font-size: 0.68rem; color: #aaa; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4px; }
    .team-fouls.bonus { color: #ffe600; }
    .score { font-size: 3rem; line-height: 1; font-weight: 950; color: #ffe600; text-shadow: 0 0 18px #ffe60044; }
    .timer-box { background: #050505; border-radius: 12px; padding: 0.8rem 0.65rem; text-align: center; cursor: pointer; border: 2px solid #3a3a3a; user-select: none; -webkit-user-select: none; display: flex; flex-direction: column; justify-content: center; }
    .timer-box.running { border-color: #ffe600; background: #262200; }
    .timer { font-size: 1.85rem; font-weight: 950; color: #ffe600; line-height: 1; }
    .timer-label { color: #aaa; font-size: 0.62rem; margin-top: 0.45rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; }

    /* Stats directly below score. Compact grid so players remain visible at the same time. */
    .stat-card-inline { background: #050505; border-radius: 12px; padding: 0.65rem; border: 1px solid #3a3a3a; margin-bottom: 0.75rem; }
    .selected-line { font-size: 0.76rem; color: #d4d4d4; margin-bottom: 0.5rem; }
    .selected-line strong { color: #ffe600; }
    .stat-tabs { display: grid; grid-template-columns: repeat(6, minmax(78px, 1fr)); gap: 0.35rem; }
    .stat-btn { background: #111; border: 1px solid #333; color: #e5e5e5; border-radius: 8px; padding: 0.45rem 0.35rem; font-size: 0.7rem; font-weight: 850; cursor: pointer; text-align: center; min-height: 38px; }
    .stat-btn:hover { border-color: #64748b; }
    .stat-btn.score-stat { color: #ffe600; border-color: #ffe60088; }
    .stat-btn.neg-stat { color: #ff7a7a; border-color: #7f1d1d88; }
    .stat-btn.foul-stat { color: #ffd84d; border-color: #ffe60088; }
    .remove-mode-line { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
    .remove-toggle { background: #451a1a; color: #fca5a5; border: 1px solid #7f1d1d; border-radius: 8px; padding: 0.4rem 0.65rem; font-size: 0.72rem; font-weight: 900; cursor: pointer; }
    .remove-toggle.active { background: #ef4444; color: #fff; border-color: #fecaca; box-shadow: 0 0 0 2px #ef444433; }
    .stat-card-inline.remove-active { border-color: #ef4444; box-shadow: 0 0 0 1px #ef444455; }
    .stat-card-inline.remove-active .selected-line strong { color: #fca5a5; }

    .alert-box { display: none; background: #2b2700; border: 1px solid #ffe600; color: #fff6a8; border-radius: 10px; padding: 0.65rem 0.75rem; font-size: 0.82rem; font-weight: 800; margin-bottom: 0.75rem; }
    .alert-box.show { display: block; }
    .alert-box.danger { background: #451a1a; border-color: #ef4444; color: #fecaca; }

    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .names-under-tally { margin-top: 0.75rem; margin-bottom: 0; }
    .names-under-tally-title { margin-top: 0.95rem; margin-bottom: 0.55rem; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.4px; color: #ffe600; font-weight: 900; }
    .team-panel { background: #050505; border-radius: 12px; padding: 0.75rem; border: 1px solid #3a3a3a; }
    .team-panel.active { border-color: #ffe600; box-shadow: 0 0 0 1px #ffe60055; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.55rem; }
    .panel-head h2 { font-size: 0.92rem; color: #ffe600; }
    .panel-head span { font-size: 0.66rem; color: #aaa; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
    .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); gap: 0.4rem; }
    .player-btn { background: #111; border: 1px solid #333; border-radius: 9px; padding: 0.48rem 0.5rem; cursor: pointer; text-align: left; display: flex; gap: 0.35rem; align-items: center; color: #94a3b8; transition: all 0.15s; min-height: 42px; }
    .player-btn:hover { border-color: #64748b; }
    .player-btn.selected { background: #333000; border-color: #ffe600; color: #fff; }
    .player-btn.foul-warning { border-color: #f59e0b; background: #3b220d; color: #fed7aa; }
    .player-btn.fouled-out { border-color: #ef4444; background: #451a1a; color: #fecaca; }
    .jersey { font-size: 0.78rem; font-weight: 950; color: #64748b; min-width: 24px; }
    .player-btn.selected .jersey { color: #ffe600; }
    .player-btn.foul-warning .jersey { color: #f97316; }
    .player-btn.fouled-out .jersey { color: #ef4444; }
    .pname { font-size: 0.76rem; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .foul-pill { margin-left: auto; font-size: 0.62rem; font-weight: 950; border-radius: 999px; padding: 0.08rem 0.32rem; background: #334155; color: #94a3b8; }
    .foul-warning .foul-pill { background: #f97316; color: #111827; }
    .fouled-out .foul-pill { background: #ef4444; color: #fff; }

    .controls-row { display: flex; gap: 0.45rem; flex-wrap: wrap; margin-top: 0.75rem; }
    .btn-sm { background: #1e3a5f; color: #93c5fd; border: none; border-radius: 8px; padding: 0.48rem 0.75rem; font-size: 0.76rem; font-weight: 800; cursor: pointer; }
    .btn-sm:hover { background: #1e40af; }
    .btn-danger { background: #451a1a; color: #fca5a5; }
    .btn-danger:hover { background: #7f1d1d; }
    .btn-export { background: #14532d; color: #86efac; }
    .btn-export:hover { background: #166534; }

    .team-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; align-items: start; }
    .team-stats-panel { background: #050505; border: 1px solid #3a3a3a; border-radius: 12px; padding: 0.75rem; min-width: 0; }
    .team-stats-layout { display: grid; grid-template-columns: minmax(150px, 0.8fr) minmax(0, 1.6fr); gap: 0.65rem; align-items: start; }
    .team-stats-layout .team-panel { padding: 0.6rem; margin: 0; }
    .team-stats-layout .player-grid { grid-template-columns: 1fr; gap: 0.34rem; }
    .team-stats-layout .player-btn { min-height: 34px; padding: 0.34rem 0.42rem; }
    .team-stats-layout .panel-head { margin-bottom: 0.45rem; }
    .team-stats-layout .panel-head h2 { font-size: 0.78rem; }
    .team-stats-layout .panel-head span { font-size: 0.58rem; }
    .team-stats-title { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 0.55rem; }
    .team-stats-title h3 { font-size: 0.9rem; color: #ffe600; }
    .team-stats-title span { font-size: 0.66rem; color: #aaa; font-weight: 850; text-transform: uppercase; letter-spacing: 0.5px; }
    .player-stat-list { display: flex; flex-direction: column; gap: 0.34rem; }
    .player-stat-header, .player-stat-row { display: grid; grid-template-columns: minmax(132px, 1.45fr) repeat(9, minmax(28px, 0.32fr)); gap: 0.24rem; align-items: stretch; }
    .player-stat-header div { background: #151515; color: #ffe600; border: 1px solid #1e293b; border-radius: 6px; padding: 0.34rem 0.14rem; text-align: center; font-size: 0.58rem; font-weight: 900; white-space: nowrap; }
    .player-stat-header .player-head { text-align: left; padding-left: 0.42rem; }
    .inline-player-btn { background: #111; border: 1px solid #333; border-radius: 8px; padding: 0.34rem 0.42rem; cursor: pointer; text-align: left; display: flex; gap: 0.35rem; align-items: center; color: #f5f5f5; transition: all 0.15s; min-height: 34px; min-width: 0; }
    .inline-player-btn:hover { border-color: #64748b; }
    .inline-player-btn.selected { background: #333000; border-color: #ffe600; color: #fff; box-shadow: 0 0 0 1px #ffe60055; }
    .inline-player-btn.foul-warning { border-color: #f59e0b; background: #3b220d; color: #fed7aa; }
    .inline-player-btn.fouled-out { border-color: #ef4444; background: #451a1a; color: #fecaca; }
    .stat-cell { background: #0f0f0f; border: 1px solid #222; border-radius: 6px; padding: 0.38rem 0.12rem; text-align: center; font-weight: 900; font-size: 0.7rem; min-height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .stat-cell:hover { border-color: #64748b; }
    .stat-cell.selected-stat { border-color: #ef4444; background: #451a1a; color: #fecaca; box-shadow: 0 0 0 1px #ef444455; }
    .player-stat-row.selected .stat-cell { border-color: #ffe60088; background: #191700; }
    .player-stat-row.selected .stat-cell.selected-stat { border-color: #ef4444; background: #451a1a; color: #fecaca; }
    .tally-actions { display: flex; gap: 0.5rem; align-items: center; justify-content: space-between; flex-wrap: wrap; margin-bottom: 0.65rem; background: #050505; border: 1px solid #3a3a3a; border-radius: 10px; padding: 0.55rem 0.65rem; }
    .tally-selected { color: #d4d4d4; font-size: 0.76rem; font-weight: 800; }
    .tally-selected strong { color: #ffe600; }
    .remove-selected-stat-btn { background: #451a1a; color: #fecaca; border: 1px solid #ef4444; border-radius: 8px; padding: 0.45rem 0.7rem; font-size: 0.74rem; font-weight: 900; cursor: pointer; }
    .remove-selected-stat-btn:disabled { opacity: 0.45; cursor: not-allowed; border-color: #444; background: #151515; color: #888; }
    .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { border-collapse: collapse; width: 100%; font-size: 0.74rem; table-layout: fixed; }
    th { background: #151515; color: #ffe600; padding: 0.42rem 0.18rem; text-align: center; font-weight: 850; border: 1px solid #1e293b; white-space: nowrap; font-size: 0.62rem; }
    td { padding: 0.38rem 0.18rem; text-align: center; border: 1px solid #222; font-weight: 800; font-size: 0.72rem; width: 34px; }
    th.name-col, td.name-cell { width: auto; min-width: 92px; }
    td.name-cell { text-align: left; color: #f5f5f5; background: #151515; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-left: 0.4rem; }
    td.name-cell.foul-warning { color: #fb923c; background: #3b220d; }
    td.name-cell.fouled-out { color: #fff; background: #7f1d1d; }
    @media (max-width: 820px) {
      .team-stats-grid { grid-template-columns: 1fr; }
      .team-stats-layout { grid-template-columns: 1fr; }
      .team-stats-layout .player-grid { grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); }
      .player-stat-header, .player-stat-row { grid-template-columns: minmax(122px, 1.25fr) repeat(9, minmax(27px, 0.28fr)); min-width: 470px; }
    }

    .log-list { display: flex; flex-direction: column; gap: 0.4rem; max-height: 240px; overflow-y: auto; padding-right: 0.25rem; }
    .log-item { background: #050505; border-radius: 8px; padding: 0.5rem 0.65rem; display: flex; justify-content: space-between; gap: 0.7rem; font-size: 0.75rem; border-left: 3px solid #ffe600; }
    .log-main { color: #f5f5f5; font-weight: 800; }
    .log-meta { color: #aaa; font-weight: 700; white-space: nowrap; }
    .empty-log { color: #aaa; font-size: 0.82rem; }


    .cpl-strip { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.65rem; padding: 0.55rem 0.75rem; background: linear-gradient(90deg, #ffe600, #fff263); color: #050505; border-radius: 14px; border: 2px solid #050505; box-shadow: 0 8px 22px #0008; }

<body>
<div class="container">
  <div class="card">
    <div class="cpl-strip">
      <div class="cpl-brand">
        <div class="cpl-logo" aria-label="Canberra Players League logo"></div>
        <div><div class="cpl-title">Canberra Players League</div><div class="cpl-subtitle">Game stats console</div></div>
      </div>
      <div class="cpl-live">CPL Live</div>
    </div>
    <div class="quarter-top" id="quarter-grid"></div>

    <div class="scoreboard">
      <div class="team-score">
        <div class="team-name" id="home-name-score">CPL Yellow</div>
        <div class="score" id="home-score">0</div>
        <div class="team-fouls" id="home-team-fouls">Q Fouls: 0</div>
      </div>
      <div class="timer-box" id="timer-box" onclick="toggleTimer()">
        <div class="timer" id="timer">10:00</div>
        <div class="timer-label" id="timer-status">Tap start</div>
      </div>
      <div class="team-score">
        <div class="team-name" id="away-name-score">CPL Black</div>
        <div class="score" id="away-score">0</div>
        <div class="team-fouls" id="away-team-fouls">Q Fouls: 0</div>
      </div>
    </div>

    <div class="alert-box" id="alert-box"></div>

    <div class="stat-card-inline" id="stat-card">
      <div class="remove-mode-line">
        <div class="selected-line">Selected: <strong id="selected-player-label">Choose a player, then tap a stat</strong></div>
        <button class="remove-toggle" id="remove-toggle" onclick="toggleRemoveMode()">Remove 1: OFF</button>
      </div>
      <div class="stat-tabs" id="stat-tabs"></div>
    </div>


    <div class="controls-row">
      <button class="btn-sm" onclick="resetClock()">Reset Clock</button>
      <button class="btn-sm" onclick="undoLast()">Undo Last</button>
      <button class="btn-sm btn-export" onclick="exportCSV()">Export CSV</button>
      <button class="btn-sm btn-danger" onclick="resetGame()">Reset Game</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Running Tally</div>
    <div class="tally-actions">
      <div class="tally-selected">Selected stat: <strong id="selected-stat-label">Tap a stat number beside a player</strong></div>
      <button class="remove-selected-stat-btn" id="remove-selected-stat-btn" onclick="removeSelectedStat()" disabled>Remove 1 Stat</button>
    </div>
    <div id="stats-table"></div>
  </div>

  <div class="card">
    <div class="card-title">Game Log</div>
    <div class="log-list" id="game-log"></div>
  </div>
</div>

<script>

      { id: 'A18', num: '18', name: 'Poppy' }, { id: 'A22', num: '22', name: 'Willow' },
      { id: 'A30', num: '30', name: 'Evie' }, { id: 'A44', num: '44', name: 'Nora' }
    ]}
  };

  const STATS = [
    { key: 'PTS1', label: '+1', value: 1, score: true },
    { key: 'PTS2', label: '+2', value: 2, score: true },
    { key: 'PTS3', label: '+3', value: 3, score: true },
    { key: 'REB', label: 'Rebound' },
    { key: 'AST', label: 'Assist' },
    { key: 'STL', label: 'Steal' },
    { key: 'BLK', label: 'Block' },
    { key: 'FOUL', label: 'Foul', negative: true, foul: true, teamFoul: true },
    { key: 'TECH1', label: 'Tech Foul 1', negative: true, foul: true, teamFoul: true },
    { key: 'TECH2', label: 'Tech Foul 2', negative: true, foul: true, teamFoul: true },
    { key: 'UNSPORT', label: 'Unsportsmanlike', negative: true, foul: true, teamFoul: true }
  ];

  function pad(n) { return String(n).padStart(2, '0'); }
  function clockText(total) { return `${Math.floor(total / 60)}:${pad(total % 60)}`; }
  function currentPeriod() { return PERIODS.find(p => p.key === period) || PERIODS[0]; }
  function periodSeconds(p = period) { const found = PERIODS.find(item => item.key === p); return found ? found.seconds : 10 * 60; }
  function periodLabel(p = period) { const found = PERIODS.find(item => item.key === p); return found ? found.label : `Q${p}`; }
  function otherTeam(teamKey) { return teamKey === 'home' ? 'away' : 'home'; }
  function statDef(key) { return STATS.find(s => s.key === key); }
  function isFoulStat(key) { const s = statDef(key); return !!(s && s.foul); }
  function isTeamFoulStat(key) { const s = statDef(key); return !!(s && s.teamFoul); }

  function showAlert(message, danger = false) {
    const el = document.getElementById('alert-box');
    el.textContent = message;
    el.className = 'alert-box show' + (danger ? ' danger' : '');
    clearTimeout(alertTimeout);
    alertTimeout = setTimeout(() => { el.className = 'alert-box'; }, 7000);
  }

  function toggleTimer() { isRunning ? stopTimer() : startTimer(); }
  function startTimer() {
    if (secondsLeft <= 0) return;
    isRunning = true;
    document.getElementById('timer-box').classList.add('running');
    document.getElementById('timer-status').textContent = 'Tap stop';
    timerInterval = setInterval(() => {
      secondsLeft--;
      renderTimer();
      if (secondsLeft <= 0) stopTimer(true);
    }, 1000);
  }
  function stopTimer(expired = false) {
    isRunning = false;
    clearInterval(timerInterval);
    timerInterval = null;
    document.getElementById('timer-box').classList.remove('running');
    document.getElementById('timer-status').textContent = expired ? 'Finished' : 'Tap start';
  }
  function resetClock() { stopTimer(); secondsLeft = periodSeconds(); renderTimer(); document.getElementById('timer-status').textContent = 'Tap start'; }
  function renderTimer() { document.getElementById('timer').textContent = clockText(secondsLeft); }

  function buildQuarters() {
    const grid = document.getElementById('quarter-grid');
    grid.innerHTML = '';
    PERIODS.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'quarter-btn' + (p.key === period ? ' active' : '');
      btn.textContent = p.label;
      btn.title = p.key <= 4 ? '10 minute quarter' : '3 minute overtime';
      btn.onclick = () => { period = p.key; resetClock(); renderAll(); };
      grid.appendChild(btn);
    });
  }

  function totalFoulsFor(playerId) { return log.filter(item => item.playerId === playerId && isFoulStat(item.statKey)).length; }
  function teamFoulsInQuarter(teamKey, q = period) { return log.filter(item => item.teamKey === teamKey && item.period === q && isTeamFoulStat(item.statKey)).length; }
  function foulClass(fouls) { if (fouls >= 5) return ' fouled-out'; if (fouls >= 4) return ' foul-warning'; return ''; }

  function buildPlayers() {
    ['home','away'].forEach(teamKey => {
      const grid = document.getElementById(`${teamKey}-players`);
      if (!grid) return;
      grid.innerHTML = '';
      TEAMS[teamKey].players.forEach(p => {
        const fouls = totalFoulsFor(p.id);
        const btn = document.createElement('button');
        btn.className = 'player-btn' + (p.id === selectedPlayerId ? ' selected' : '') + foulClass(fouls);
        btn.innerHTML = `<span class="jersey">#${p.num}</span><span class="pname">${p.name}</span>${fouls > 0 ? `<span class="foul-pill">${fouls}F</span>` : ''}`;
        btn.onclick = () => selectPlayer(teamKey, p.id);
        grid.appendChild(btn);
      });
    });
    const homePanel = document.getElementById('panel-home');
    const awayPanel = document.getElementById('panel-away');
    if (homePanel) homePanel.classList.toggle('active', selectedTeam === 'home');
    if (awayPanel) awayPanel.classList.toggle('active', selectedTeam === 'away');
    updateSelectedLabel();
  }
  function selectPlayer(teamKey, playerId) { selectedTeam = teamKey; selectedPlayerId = playerId; selectedStatKey = null; renderAll(); }
  function selectedPlayer() {
    if (!selectedTeam || !selectedPlayerId) return null;
    return TEAMS[selectedTeam].players.find(p => p.id === selectedPlayerId) || null;
  }
  function clearSelection() {
    selectedTeam = null;
    selectedPlayerId = null;
    selectedStatKey = null;
  }
  function updateSelectedLabel() {
    const p = selectedPlayer();
    const action = removeMode ? 'Remove from' : 'Selected';
    document.getElementById('selected-player-label').textContent = p ? `${action}: ${TEAMS[selectedTeam].name} — #${p.num} ${p.name}` : (removeMode ? 'Remove mode: choose a player, then tap the stat to subtract' : 'Choose a player, then tap a stat');
  }

  function toggleRemoveMode() {
    removeMode = !removeMode;
    renderAll();
  }

  function renderRemoveMode() {
    const card = document.getElementById('stat-card');
    const btn = document.getElementById('remove-toggle');
    if (!card || !btn) return;
    card.classList.toggle('remove-active', removeMode);
    btn.classList.toggle('active', removeMode);
    btn.textContent = removeMode ? 'Remove 1: ON' : 'Remove 1: OFF';
  }

  function buildStatTabs() {
    const grid = document.getElementById('stat-tabs');
    grid.innerHTML = '';
    STATS.forEach(stat => {
      const btn = document.createElement('button');
      btn.className = 'stat-btn' + (stat.score ? ' score-stat' : '') + (stat.negative ? ' neg-stat' : '') + (stat.foul ? ' foul-stat' : '');
      btn.textContent = stat.label;
      btn.onclick = () => removeMode ? removeStat(stat.key) : addStat(stat.key);
      grid.appendChild(btn);
    });
  }

  function addStat(statKey) {
    const stat = statDef(statKey);
    const p = selectedPlayer();
    if (!p || !selectedTeam) {
      showAlert('Select a player first, then tap the stat to record it.', false);
      return;
    }
    const foulsBefore = totalFoulsFor(p.id);
    const teamFoulsBefore = teamFoulsInQuarter(selectedTeam);

    log.unshift({
      id: Date.now() + Math.random(), period, periodLabel: periodLabel(), clock: clockText(secondsLeft),
      teamKey: selectedTeam, team: TEAMS[selectedTeam].name,
      playerId: p.id, number: p.num, player: p.name,
      statKey, stat: stat.label, points: stat.score ? stat.value : 0
    });

    if (isFoulStat(statKey)) {
      const foulsNow = foulsBefore + 1;
      if (foulsNow === 4) showAlert(`Warning: #${p.num} ${p.name} now has 4 fouls.`, false);
      if (foulsNow === 5) showAlert(`Foul out: #${p.num} ${p.name} now has 5 fouls.`, true);
    }

    if (isTeamFoulStat(statKey)) {
      const teamFoulsNow = teamFoulsBefore + 1;
      if (teamFoulsNow === 5) {
        showAlert(`${TEAMS[selectedTeam].name} has 5 team fouls in ${periodLabel()}. ${TEAMS[otherTeam(selectedTeam)].name} is now in the bonus/free throws on defensive fouls.`, true);
      }
    }

    clearSelection();
    renderAll();
  }
  function removeStat(statKey) {
    const p = selectedPlayer();
    if (!p || !selectedTeam) {
      showAlert('Select a player first, then choose a stat to subtract.', false);
      return;
    }

    if (statKey === 'PTS') {
      const scoreIndex = log.findIndex(item => item.playerId === p.id && item.teamKey === selectedTeam && ['PTS1','PTS2','PTS3'].includes(item.statKey));
      if (scoreIndex === -1) {
        showAlert(`#${p.num} ${p.name} does not have any points to remove.`, false);
        return;
      }
      const item = log[scoreIndex];
      if (item.points > 1) {
        item.points -= 1;
        item.statKey = `PTS${item.points}`;
        item.stat = `+${item.points}`;
      } else {
        log.splice(scoreIndex, 1);
      }
      showAlert(`Removed 1 point from #${p.num} ${p.name}.`, false);
      clearSelection();
      removeMode = false;
      renderAll();
      return;
    }

    const stat = statDef(statKey);
    if (!stat) return;
    const index = log.findIndex(item => item.playerId === p.id && item.teamKey === selectedTeam && item.statKey === statKey);
    if (index === -1) {
      showAlert(`#${p.num} ${p.name} does not have any ${stat.label} to remove.`, false);
      return;
    }

    log.splice(index, 1);
    showAlert(`Removed 1 ${stat.label} from #${p.num} ${p.name}.`, false);
    clearSelection();
    removeMode = false;
    renderAll();
  }
  function selectStatCell(teamKey, playerId, statKey) {
    selectedTeam = teamKey;
    selectedPlayerId = playerId;
    selectedStatKey = statKey;
    renderAll();
  }

  function updateSelectedStatLabel() {
    const label = document.getElementById('selected-stat-label');
    const btn = document.getElementById('remove-selected-stat-btn');
    if (!label || !btn) return;
    const p = selectedPlayer();
    const stat = statDef(selectedStatKey);
    if (p && stat) {
      label.textContent = `${TEAMS[selectedTeam].name} — #${p.num} ${p.name}: ${stat.label}`;
      btn.disabled = false;
    } else {
      label.textContent = 'Tap a stat number beside a player';
      btn.disabled = true;
    }
  }

  function removeSelectedStat() {
    if (!selectedStatKey) {
      showAlert('Tap a stat number beside a player first, then press Remove 1 Stat.', false);
      return;
    }
    removeStat(selectedStatKey);
  }

  function undoLast() { if (log.length) log.shift(); renderAll(); }
  function resetGame() {
    if (!confirm('Reset all scores, stats and the game log?')) return;
    log = []; period = 1; removeMode = false; selectedStatKey = null; resetClock(); document.getElementById('alert-box').className = 'alert-box'; renderAll();
  }

  function getPlayerRows() {
    const rows = [];
    Object.keys(TEAMS).forEach(teamKey => TEAMS[teamKey].players.forEach(p => rows.push({ teamKey, team: TEAMS[teamKey].name, ...p })));
    return rows;
  }
  function playerTotals() {
    const totals = {};
    getPlayerRows().forEach(p => totals[p.id] = { team: p.team, number: p.num, player: p.name, PTS: 0, REB: 0, AST: 0, STL: 0, BLK: 0, FOUL: 0, TECH1: 0, TECH2: 0, UNSPORT: 0, TOTAL_FOULS: 0 });
    log.forEach(item => {
      const row = totals[item.playerId]; if (!row) return;
      if (['PTS1','PTS2','PTS3'].includes(item.statKey)) row.PTS += item.points;
      else if (row[item.statKey] !== undefined) row[item.statKey]++;
      if (isFoulStat(item.statKey)) row.TOTAL_FOULS++;
    });
    return totals;
  }
  function teamScore(teamKey) { return log.filter(l => l.teamKey === teamKey).reduce((sum, l) => sum + l.points, 0); }

  function renderScores() {
    document.getElementById('home-score').textContent = teamScore('home');
    document.getElementById('away-score').textContent = teamScore('away');
    ['home','away'].forEach(teamKey => {
      const fouls = teamFoulsInQuarter(teamKey);
      const el = document.getElementById(`${teamKey}-team-fouls`);
      el.textContent = fouls >= 5 ? `Q Fouls: ${fouls} · BONUS` : `Q Fouls: ${fouls}`;
      el.classList.toggle('bonus', fouls >= 5);
    });
  }

  function renderStatsTable() {
    const totals = playerTotals();
    const statCols = ['PTS','REB','AST','STL','BLK','TOTAL_FOULS','TECH1','TECH2','UNSPORT'];
    const colLabels = ['PTS','REB','AST','STL','BLK','F','TF1','TF2','UF'];

    function teamTable(teamKey) {
      const rows = Object.values(totals).filter(row => row.team === TEAMS[teamKey].name);
      let html = `<div class="team-stats-panel${selectedTeam === teamKey ? ' active' : ''}">`;
      html += `<div class="team-stats-title"><h3>${TEAMS[teamKey].name}</h3><span>${teamScore(teamKey)} pts · ${periodLabel()} fouls ${teamFoulsInQuarter(teamKey)}</span></div>`;
      html += `<div class="table-scroll"><div class="player-stat-list">`;
      html += `<div class="player-stat-header"><div class="player-head">Tap player</div>`;
      colLabels.forEach(label => { html += `<div>${label}</div>`; });
      html += `</div>`;
      rows.forEach(row => {
        const cls = foulClass(row.TOTAL_FOULS).trim();
        const selected = row.team === (selectedTeam ? TEAMS[selectedTeam].name : '') && row.number === (selectedPlayer()?.num || '');
        html += `<div class="player-stat-row${selected ? ' selected' : ''}">`;
        html += `<button class="inline-player-btn${selected ? ' selected' : ''} ${cls}" onclick="selectPlayer('${teamKey}', '${TEAMS[teamKey].players.find(p => p.num === row.number).id}')"><span class="jersey">#${row.number}</span><span class="pname">${row.player}</span>${row.TOTAL_FOULS > 0 ? `<span class="foul-pill">${row.TOTAL_FOULS}F</span>` : ''}</button>`;
        statCols.forEach(col => { const isSelectedStat = selected && selectedStatKey === col; html += `<div class="stat-cell${isSelectedStat ? ' selected-stat' : ''}" onclick="selectStatCell('${teamKey}', '${TEAMS[teamKey].players.find(p => p.num === row.number).id}', '${col}')">${row[col]}</div>`; });
        html += `</div>`;
      });
      html += `</div></div></div>`;
      return html;
    }

    document.getElementById('stats-table').innerHTML = `<div class="team-stats-grid">${teamTable('home')}${teamTable('away')}</div>`;
  }
  function renderLog() {
    const el = document.getElementById('game-log');
    if (!log.length) { el.innerHTML = '<div class="empty-log">No stats recorded yet.</div>'; return; }
    el.innerHTML = log.map(item => `<div class="log-item"><div class="log-main">${item.team} — #${item.number} ${item.player}: ${item.stat}</div><div class="log-meta">${item.periodLabel || periodLabel(item.period)} · ${item.clock}</div></div>`).join('');
  }

  function csvEscape(value) { const str = String(value ?? ''); return /[",\n]/.test(str) ? `"${str.replace(/"/g, '""')}"` : str; }
  function exportCSV() {
    const rows = [];
    rows.push(['SUMMARY']);
    rows.push(['Team','Player','PTS','REB','AST','STL','BLK','Fouls','Tech Foul 1','Tech Foul 2','Unsportsmanlike']);
    Object.values(playerTotals()).forEach(r => rows.push([r.team, `#${r.number} ${r.player}`, r.PTS, r.REB, r.AST, r.STL, r.BLK, r.TOTAL_FOULS, r.TECH1, r.TECH2, r.UNSPORT]));
    rows.push([]); rows.push(['TEAM FOULS BY PERIOD']); rows.push(['Team', ...PERIODS.map(p => p.label)]);
    ['home','away'].forEach(t => rows.push([TEAMS[t].name, ...PERIODS.map(p => teamFoulsInQuarter(t,p.key))]));
    rows.push([]); rows.push(['GAME LOG']); rows.push(['Period','Clock','Team','Player','Stat','Points']);
    [...log].reverse().forEach(l => rows.push([l.periodLabel || periodLabel(l.period), l.clock, l.team, `#${l.number} ${l.player}`, l.stat, l.points]));
    const csv = rows.map(row => row.map(csvEscape).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'basketball_stats.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  function renderAll() { renderTimer(); buildQuarters(); renderScores(); renderStatsTable(); buildPlayers(); renderLog(); renderRemoveMode(); updateSelectedStatLabel(); }
  buildStatTabs(); renderAll();
</script>
</body>
</html>
